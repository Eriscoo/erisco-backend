version: "3.9"
services:
  postgres:
    image: postgres:17-alpine
    container_name: eriscoo-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: eriscoodb
      POSTGRES_USER: eriscoo
      POSTGRES_PASSWORD: "P@ssword!"
      TZ: Asia/Jakarta
    volumes:
      - eriscoo-postgres-volume:/var/lib/postgresql/data

volumes:
  eriscoo-postgres-volume:
